<div
  class="delivery-card animate-slide-up"
  [style.animation-delay]="index * 80 + 'ms'"
>
  <button
    class="delivery-header"
    (click)="expanded = !expanded"
    [attr.aria-expanded]="expanded"
  >
    <div class="delivery-header-left">
      <div class="delivery-icon">
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
          />
          <polyline points="14 2 14 8 20 8" />
        </svg>
      </div>
      <div class="delivery-info">
        <h3 class="delivery-title">{{ delivery.title }}</h3>
        <p class="delivery-desc">{{ delivery.description }}</p>
        <div class="delivery-tags">
          <span class="delivery-tag">{{ delivery.category }}</span>
          <span class="delivery-tag">{{ delivery.relatedPhase }}</span>
        </div>
      </div>
    </div>
    <div class="delivery-header-right">
      <div class="delivery-meta">
        <span class="delivery-author">{{ delivery.createdByName }}</span>
        <span class="delivery-date"
          >{{ formatDate(delivery.createdAt) }}
          <span class="delivery-relative">· {{ getRelativeTime(delivery.createdAt) }}</span>
        </span>
      </div>
      <div class="delivery-stats">
        <span class="delivery-count"
          >{{ delivery.documents.length }} archivo{{
            delivery.documents.length > 1 ? 's' : ''
          }}</span
        >
        <div class="file-type-badges">
          @for (badge of getFileTypeBadges(); track badge.type) {
            <span class="file-type-badge" [class]="'badge-' + badge.color">
              {{ badge.count }} {{ badge.type }}
            </span>
          }
        </div>
      </div>
      <svg
        class="chevron"
        [class.rotated]="expanded"
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <polyline points="6 9 12 15 18 9" />
      </svg>
    </div>
  </button>

  @if (expanded) {
    <div class="delivery-documents animate-expand-down">
      @for (doc of delivery.documents; track doc.id) {
        <div class="doc-row">
          <div
            class="doc-icon"
            [innerHTML]="getFileIcon(doc.mimeType)"
          ></div>
          <div class="doc-info">
            <span class="doc-name">{{ doc.originalName }}</span>
            <span class="doc-meta"
              >{{ getFileTypeLabel(doc.mimeType) }} ·
              {{ formatSize(doc.sizeBytes) }}</span
            >
          </div>
          <button
            class="doc-action"
            title="Descargar"
            aria-label="Descargar archivo"
          >
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="7 10 12 15 17 10" />
              <line x1="12" y1="15" x2="12" y2="3" />
            </svg>
          </button>
        </div>
      }
    </div>
  }
</div>
